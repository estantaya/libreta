<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libreta - Inventario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Libreta</h1></header>
	
	<div id="modal-agregar" style="display:none; position:fixed; top:20%; left:10%; width:80%; background:white; padding:20px; box-shadow:0 0 10px rgba(0,0,0,0.5);">
		<input type="text" id="nuevo-nombre" placeholder="Nombre del producto">
		<input type="number" id="nuevo-stock" placeholder="Cantidad">
		<button onclick="guardarProducto()">Guardar</button>
		<button onclick="cerrarModal()">Cancelar</button>
	</div>
    
    <div id="lista-inventario">
        </div>

    <button id="btn-agregar" onclick="abrirModal()">+</button>

    <script src="app.js"></script>
</body>
</html>
